services:

  llamacpp-bitnet:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Troque o modelo abaixo antes do deploy sem precisar editar scripts!
        # Recomendações PT-BR: tiiuae/Falcon3-7B-Instruct-1.58bit
        - HF_REPO=${BITNET_MODEL:-tiiuae/Falcon3-7B-Instruct-1.58bit}

    environment:
      BITNET_THREADS: ${BITNET_THREADS:-3}
      BITNET_CTX: ${BITNET_CTX:-4096}
      BITNET_PORT: ${BITNET_PORT:-8080}
      BITNET_TEMPERATURE: ${BITNET_TEMPERATURE:-0.0}

    volumes:
      # Apenas o modelo persiste — o build está na imagem
      - bitnet-models:/models

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s   # modelo já está na imagem, startup é rápido

    networks:
      - ai-stack

    restart: unless-stopped

volumes:
  bitnet-models:

networks:
  ai-stack:
    external: true